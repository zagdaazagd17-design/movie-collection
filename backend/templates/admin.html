<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold"> Admin Panel</span>
    <div>
      <a href="/" class="btn btn-outline-light btn-sm me-2">← View Site</a>
      <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
  </nav>

  <div class="container mt-4">

    <!-- ADD / EDIT FORM -->
    <div class="card p-4 mb-4 shadow-sm">
      <h5 id="formTitle"> Add New Movie</h5>
      <input type="hidden" id="editId"/>
      <div class="row g-3">
        <div class="col-md-6">
          <input type="text" id="title" class="form-control" placeholder="Title *"/>
        </div>
        <div class="col-md-3">
          <input type="text" id="genre" class="form-control" placeholder="Genre"/>
        </div>
        <div class="col-md-3">
          <input type="number" id="year" class="form-control" placeholder="Year"/>
        </div>
        <div class="col-12">
          <textarea id="description" class="form-control" rows="2" placeholder="Description"></textarea>
        </div>
        <div class="col-md-3">
          <input type="number" id="rating" class="form-control" placeholder="Rating (1-5)" min="1" max="5" step="0.1"/>
        </div>
        <div class="col-md-9">
          <input type="text" id="poster_url" class="form-control" placeholder="Poster image URL (optional)"/>
        </div>
        <div class="col-12">
          <button onclick="saveMovie()" class="btn btn-success me-2"> Save Movie</button>
          <button onclick="resetForm()" class="btn btn-secondary"> Cancel</button>
        </div>
      </div>
    </div>

    <!-- MOVIES TABLE -->
    <div class="card p-4 shadow-sm">
      <h5> All Movies</h5>
      <table class="table table-hover align-middle mt-2">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Poster</th>
            <th>Title</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Rating</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="movieTableBody">
          <!-- Rows injected by JavaScript -->
        </tbody>
      </table>
    </div>

  </div>

  <script src="/static/js/admin.js"></script>
</body>
</html>
