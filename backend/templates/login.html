<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

  <div class="card p-4 shadow" style="width: 380px;">
    <h3 class="text-center mb-4"> Admin Login</h3>

    <!-- Error message (hidden by default) -->
    <div id="errorMsg" class="alert alert-danger d-none">
      Wrong username or password!
    </div>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="admin"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="********"/>
    </div>
    <button onclick="doLogin()" class="btn btn-dark w-100">Login</button>
    <a href="/" class="btn btn-link w-100 mt-2"> Back to Movies</a>
  </div>

  <script>
    async function doLogin() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // Send login request to Flask
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        // Redirect to admin panel on success
        window.location.href = "/admin";
      } else {
        // Show error message
        document.getElementById("errorMsg").classList.remove("d-none");
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
